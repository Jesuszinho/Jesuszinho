name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Jesuszinho
          outputs: |
            dist/snake.svg?palette=github-dark&smooth=true&color_snake=#00F7FF,#7C3AED,#F72585

      - name: Add glow
        run: |
          chmod -R 777 dist
          sed -i 's/<svg /<svg style="filter: drop-shadow(0 0 6px #00F7FF) drop-shadow(0 0 10px #7C3AED);" /' dist/snake.svg

      - name: Push to output branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Jesuszinho/Jesuszinho.git repo
          cd repo
          git checkout -B output
          rm -rf * .github || true
          cp -r ../dist/* .
          git add .
          git commit -m "update snake" || echo "no changes"
          git push origin output --force
