# Snake game workflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'
      - name: Build
        run: npm install && npm run build

  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Deploy
        run: npm run deploy

# Colors
# Update line 20 to use red and black tones
    colors: ["red", "black"]

# Effects
# Update line 25 to use red glow effect
    effects: ["red glow"]
