name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Jesuszinho
          outputs: |
            outputs: |
            dist/snake.svg?palette=github-dark&smooth=true&color_snake=#8B0000,#B22222,#FF0000&color_dots=#161B22,#222222,#444444,#666666,#999999

      - name: Push to output branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Jesuszinho/Jesuszinho.git repo
          cd repo
          git checkout -B output
          rm -rf * .github || true
          cp -r ../dist/* .
          git add .
          git commit -m "update snake" || echo "no changes"
          git push origin output --force
